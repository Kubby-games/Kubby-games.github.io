<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUBBY GAMES</title>
<meta name="description" content="Замена старому сайту">
<meta name="keywords" content="Kubby Games, Kubby Games Website, Official Kubby Games, Games, Studio, кубби геймс">
<meta name="robots" content="index, follow">
<link rel="icon" href="assets/images/icon.svg" type="image/svg+xml">
<script>
document.documentElement.classList.add('page-transitions-enabled');
</script>

<style>
@font-face {
    font-family: 'KBF';
    src: url('assets/fonts/Kbf Ru.ttf') format('truetype');
}
@font-face {
    font-family: 'KBF';
    src: url('assets/fonts/Kbf En.ttf') format('truetype');
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'KBF', sans-serif;
}

html {
    min-height: 100%;
    background: #000;
}

@keyframes moveBG {
    0% { background-position: 0 0; }
    100% { background-position: 100% 100%; }
}

body {
    min-height: 100vh;
    position: relative;
    isolation: isolate;
    overflow-x: hidden;
    background: #000;
    color: #fff;
    padding: 40px 20px 56px;
    background-image: url("assets/images/bbg.png");
    background-repeat: repeat;
    background-size: 100px;
    animation: moveBG 30s ease-in-out infinite alternate;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.55s ease;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.95));
    pointer-events: none;
    z-index: 0;
}

.page-shell {
    position: relative;
    z-index: 1;
}

html.page-transitions-enabled body::before {
    opacity: 1;
}

html.page-transitions-enabled body .page-shell {
    opacity: 0;
    transform: translateY(18px) scale(0.988);
    transition: opacity 0.5s ease, transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
}

html.page-transitions-enabled body.page-ready .page-shell {
    opacity: 1;
    transform: translateY(0);
}

html.page-transitions-enabled body.page-ready::before {
    opacity: 0;
}

html.page-transitions-enabled body.page-leaving .page-shell {
    opacity: 0;
    transform: translateY(18px) scale(0.988);
    pointer-events: none;
}

html.page-transitions-enabled body.page-leaving::before {
    opacity: 1;
}

.logo {
    display: block;
    margin: 0 auto 35px;
    width: 100%;
    max-width: 420px;
    height: auto;
    transition: transform 0.35s ease, filter 0.35s ease;
}

.logo:hover {
    transform: translateY(-4px) scale(1.02);
    filter: drop-shadow(0 0 18px rgba(255,255,255,0.28));
}

.section-title {
    font-size: 34px;
    margin-bottom: 18px;
    text-align: center;
    color: #fff;
    letter-spacing: 2px;
}

[data-depth] {
    transform-style: preserve-3d;
    will-change: transform;
}

.grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 18px;
}

.card {
    --ui-shift-x: 0px;
    --ui-shift-y: 0px;
    --ui-rotate-x: 0deg;
    --ui-rotate-y: 0deg;
    --ui-scale: 1;
    position: relative;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.2);
    padding: 16px;
    border-radius: 12px;
    text-decoration: none;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 14px;
    overflow: hidden;
    transform-style: preserve-3d;
    will-change: transform;
    transform:
        perspective(900px)
        translate3d(var(--ui-shift-x), var(--ui-shift-y), 0)
        rotateX(var(--ui-rotate-x))
        rotateY(var(--ui-rotate-y))
        scale(var(--ui-scale));
    transition: background 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
    backdrop-filter: blur(4px);
}

.card::after {
    content: "";
    position: absolute;
    left: 12px;
    right: 12px;
    bottom: 8px;
    height: 16px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(0,0,0,0.34) 0%, rgba(0,0,0,0) 74%);
    opacity: 0.32;
    transform: translateY(10px) scale(0.88);
    filter: blur(10px);
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
}

.card::before {
    content: "";
    position: absolute;
    inset: -35%;
    background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 62%);
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.28s ease, transform 0.28s ease;
}

.card:hover,
.card.is-ui-hovered {
    background: rgba(255,255,255,0.15);
    border-color: #fff;
    box-shadow: 0 16px 28px rgba(0,0,0,0.32);
}

.card:hover::before,
.card.is-ui-hovered::before {
    opacity: 1;
    transform: scale(1);
}

.card:hover::after,
.card.is-ui-hovered::after {
    opacity: 0.48;
    transform: translateY(12px) scale(0.98);
}

.card img {
    position: relative;
    z-index: 1;
    width: 50px;
    height: 50px;
    object-fit: contain;
    transform: translate3d(var(--depth-x, 0px), var(--depth-y, 0px), 20px);
    transition: transform 0.28s ease, filter 0.28s ease;
}

.card:hover img,
.card.is-ui-hovered img {
    transform: translate3d(var(--depth-x, 0px), var(--depth-y, 0px), 20px) scale(1.14) rotate(-6deg);
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.45));
}

.card-title {
    position: relative;
    z-index: 1;
    font-size: 22px;
    transform: translate3d(var(--depth-x, 0px), var(--depth-y, 0px), -10px);
    transition: transform 0.28s ease, letter-spacing 0.28s ease;
}

.card:hover .card-title,
.card.is-ui-hovered .card-title {
    transform: translate3d(var(--depth-x, 0px), var(--depth-y, 0px), -10px) translateX(4px);
    letter-spacing: 1px;
}

.game-card {
    --card-shift-x: 0px;
    --card-shift-y: 0px;
    --card-rotate-x: 0deg;
    --card-rotate-y: 0deg;
    --card-scale: 1;
    --bg-offset-x: 0px;
    --bg-offset-y: 0px;
    --img-shift-x: 0px;
    --img-shift-y: 0px;
    --img-scale: 1;
    --img-lift: 34px;
    position: relative;
    display: block;
    width: 100%;
    max-width: 900px;
    height: 180px;
    margin: 0 auto;
    border-radius: 16px;
    background-image: url("assets/images/bg.png");
    background-size: cover;
    background-position: calc(50% - var(--bg-offset-x)) calc(50% - var(--bg-offset-y));
    overflow: hidden;
    cursor: pointer;
    border: 3px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 15px rgba(0,0,0,0.8);
    transform-style: preserve-3d;
    will-change: transform;
    transition: border-color 0.35s ease, box-shadow 0.35s ease;
    transform:
        perspective(1200px)
        translate3d(var(--card-shift-x), var(--card-shift-y), 0)
        rotateX(var(--card-rotate-x))
        rotateY(var(--card-rotate-y))
        scale(var(--card-scale));
}

.game-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    transition: 0.35s ease;
}

.game-card::after {
    content: "";
    position: absolute;
    inset: -18%;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 66%);
    opacity: 0;
    transform: scale(0.65);
    transition: opacity 0.35s ease, transform 0.35s ease;
}

.game-card:hover::before,
.game-card.is-tilting::before {
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.15);
}

.game-card:hover::after,
.game-card.is-tilting::after {
    opacity: 1;
    transform: scale(1);
}

.game-card:hover,
.game-card.is-tilting {
    border-color: #fff;
    box-shadow: 0 0 18px rgba(255,255,255,0.5);
}

.game-img {
    position: absolute;
    left: 3%;
    top: 50%;
    z-index: 2;
    width: 120vw;
    max-width: 330px;
    height: auto;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.9));
    transform-style: preserve-3d;
    will-change: transform;
    transition: filter 0.35s ease;
    transform:
        translate3d(var(--img-shift-x), calc(-50% + var(--img-shift-y)), var(--img-lift))
        scale(var(--img-scale));
}

.game-card:hover .game-img,
.game-card.is-tilting .game-img {
    filter: drop-shadow(0 0 14px rgba(255,255,255,0.8));
}

.shop-link-wrap {
    display: flex;
    justify-content: center;
}

.shop-link {
    --ui-shift-x: 0px;
    --ui-shift-y: 0px;
    --ui-rotate-x: 0deg;
    --ui-rotate-y: 0deg;
    --ui-scale: 1;
    position: relative;
    display: inline-block;
    text-decoration: none;
    color: #fff;
    padding: 16px 28px;
    border-radius: 999px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    font-size: 24px;
    letter-spacing: 1px;
    transform-style: preserve-3d;
    will-change: transform;
    transform:
        perspective(900px)
        translate3d(var(--ui-shift-x), var(--ui-shift-y), 0)
        rotateX(var(--ui-rotate-x))
        rotateY(var(--ui-rotate-y))
        scale(var(--ui-scale));
    transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}

.shop-link::after {
    content: "";
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 6px;
    height: 14px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(0,0,0,0.34) 0%, rgba(0,0,0,0) 74%);
    opacity: 0.28;
    transform: translateY(8px) scale(0.9);
    filter: blur(10px);
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
}

.shop-link:hover,
.shop-link.is-ui-hovered {
    background: rgba(255,255,255,0.16);
    border-color: rgba(255,255,255,0.42);
    box-shadow: 0 14px 24px rgba(0,0,0,0.28);
}

.shop-link:hover::after,
.shop-link.is-ui-hovered::after {
    opacity: 0.44;
    transform: translateY(10px) scale(1);
}

.shop-link-label {
    display: inline-block;
    transform: translate3d(var(--depth-x, 0px), var(--depth-y, 0px), -10px);
    transition: transform 0.22s ease, letter-spacing 0.22s ease;
}

.shop-link:hover .shop-link-label,
.shop-link.is-ui-hovered .shop-link-label {
    transform: translate3d(var(--depth-x, 0px), var(--depth-y, 0px), -10px) translateY(-1px);
    letter-spacing: 1.4px;
}

@media (max-width: 640px) {
    body {
        padding: 28px 16px 40px;
    }

    .shop-link {
        width: 100%;
        max-width: 340px;
        text-align: center;
        font-size: 22px;
    }
}
</style>
</head>
